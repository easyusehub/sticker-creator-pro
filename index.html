<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Creator Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="https://ibb.co/MkCRCWV8">
    <img src="https://i.ibb.co/QvK6KzN8/file-0000000070b871fab8ee7a49627db4c4.png" alt="Sticker Creator Pro Logo">
  </a>
  <div class="ad-top">
    <p>Top Ad Banner</p>
  </div>
</header>

<main>
  <aside class="ad-sidebar">
    <p>Sidebar Ad</p>
  </aside>

  <section class="sticker-tool">
    <input type="file" id="upload" accept="image/*" multiple>
    <canvas id="canvas" width="400" height="400"></canvas>
    <br>
    <label>
      <input type="checkbox" id="outlineToggle"> Add Outline / Cartoon Effect
    </label>
    <br>
    <button id="downloadBtn">Download Current Sticker</button>
    <button id="batchDownloadBtn">Download All Stickers</button>
  </section>
</main>

<footer>
  <div class="ad-footer">
    <p>Footer Ad Space</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
