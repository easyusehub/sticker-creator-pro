<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Creator Pro Advanced</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="#"><img src="assets/logo.png" alt="Sticker Creator Pro Logo"></a>
  <div class="ad-top"><p>Top Ad Banner</p></div>
</header>

<main>
  <aside class="ad-sidebar"><p>Sidebar Ad</p></aside>

  <section class="sticker-tool">
    <input type="file" id="upload" accept="image/*" multiple>
    <div class="canvas-container">
      <canvas id="canvas" width="400" height="400"></canvas>
    </div>
    <br>
    <label><input type="checkbox" id="outlineToggle"> Add Outline / Cartoon Effect</label>
    <br>
    <button id="downloadBtn">Download Current Sticker</button>
    <button id="batchDownloadBtn">Download All Stickers</button>
  </section>
</main>

<footer>
  <div class="ad-footer"><p>Footer Ad Space</p></div>
</footer>

<script src="script.js"></script>
</body>
</html>
